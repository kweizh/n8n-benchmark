s to perform asynchronous tasks. To synchronize these branches, a Merge node is used to wait for all parallel paths to complete before continuing the workflow.\n\n## Requirements\nCreate an n8n workflow that splits into two branches and waits for both to complete before proceeding.\n1. Start with a **Manual Trigger** node.\n2. Branch into two parallel paths from the trigger.\n3. In Branch 1, add a node (e.g., Code or Set) that outputs the JSON: `{\"branch\": \"A\"}`.\n4. In Branch 2, add a node (e.g., Code or Set) that outputs the JSON: `{\"branch\": \"B\"}`.\n5. Add a **Merge** node that takes input from both branches. Configure it to wait for both inputs to arrive and then output the data from Branch 1.\n6. Save the exported workflow JSON to `/home/user/workspace/workflow.json`.\n7. The workflow JSON must have its `id` set to `\"test-workflow\"` at the root level.\n\n## Implementation Guide\n1. You can start n8n locally by running `n8n start` in the background (e.g., `n8n start \u0026`).\n2. Access the n8n UI at `http://localhost:5678` to build the workflow.\n3. Create the nodes as specified and connect them.\n4. For the Merge node, ensure it is configured to wait for both inputs to arrive and outputs the data from Branch 1.\n5. Download or export the workflow JSON.\n6. Ensure the root level of the JSON has `\"id\": \"test-workflow\"`.\n7. Save it to `/home/user/workspace/workflow.json`.\n\n## Constraints\n- Project path: `/home/user/workspace`\n- Output file: `/home/user/workspace/workflow.json`\n- The workflow must successfully execute using `n8n execute --id=test-workflow` and output the expected data."])</script><script>self.__next_f.push([1,"a:T5f1,"])</script><script>self.__next_f.push([1,"# Compress Multiple Files into a ZIP Archive in n8n\n\n## Background\nYou need to package multiple files into a single ZIP archive using n8n. The Compression node allows you to combine multiple binary properties from a single item into a ZIP file.\n\n## Requirements\n- Create an n8n workflow that triggers manually.\n- Read two files from the local filesystem: `/home/user/file1.txt` and `/home/user/file2.txt`.\n- Place the first file into a binary property named `file1` and the second into `file2` on the same item.\n- Compress both files into a single ZIP archive named `archive.zip` using the Compression node.\n- Write the resulting ZIP archive to `/home/user/output/archive.zip`.\n- The final workflow must be saved to `/home/user/workflow.json`.\n\n## Implementation Guide\n1. Use a Manual Trigger node.\n2. Use the `Read/Write Files from Disk` node to read `/home/user/file1.txt` into the binary property `file1`.\n3. Use a second `Read/Write Files from Disk` node to read `/home/user/file2.txt` into the binary property `file2`.\n4. Use the `Compression` node to compress `file1,file2` into `archive.zip` (Output Format: Zip). Set the output binary property to `data`.\n5. Use a final `Read/Write Files from Disk` node to write the `data` property to `/home/user/output/archive.zip`.\n6. Export the workflow to `/home/user/workflow.json` using the n8n CLI: `n8n export:workflow --all --output=/home/user/workflow.json`.\n\n## Constraints\n- Project path: /home/user\n- n8n is running on port 5678.\n- Do not change the original files."])</script><script>self.__next_f.push([1,"b:T558,"])</script><script>self.__next_f.push([1,"# Database Cleanup with n8n\n\n## Background\nYou need to automate the cleanup of old logs in a PostgreSQL database using an n8n workflow. The workflow should run on a daily schedule and delete records older than 30 days.\n\n## Requirements\n1. Start the necessary services (PostgreSQL and n8n) by running `/home/user/n8n-task/start.sh`.\n2. Create an n8n workflow named `Database Cleanup Workflow`.\n3. The workflow must contain a Schedule Trigger node (`n8n-nodes-base.scheduleTrigger`) configured to run daily at 3:00 AM (using the cron expression `0 3 * * *`).\n4. The workflow must contain a Postgres node (`n8n-nodes-base.postgre  or \"Set\" node to extract the file name from the binary data metadata and place it into the `json.fileName` property.\n6. Save the workflow and export it to `/home/user/workflow.json`.\n\n## Constraints\n- Project path: /home/user\n- Log file: /home/user/output.log\n- Start command: `n8n start`\n- Port: 5678"])</script><script>self.__next_f.push([1,"15:T5bf,"])</script><script>self.__next_f.push([1,"# n8n Set Node: Keep Only Set\n\n## Background\nIn n8n, workflows often process large JSON objects containing sensitive or unnecessary data. The `Set` node (or \"Edit Fields\" node) is used to reshape data by keeping only the fields you need.\n\n## Requirements\n- Create an n8n workflow file at `/home/user/workspace/workflow.json`.\n- The workflow must contain a **Manual Trigger** node (`n8n-nodes-base.manualTrigger`).\n- The workflow must contain a **Code** node (`n8n-nodes-base.code`) that outputs the following mock data (a single item):\n  ```json\n  {\n    \"user_id\": 123,\n    \"name\": \"John Doe\",\n    \"email\": \"john@example.com\",\n    \"password_hash\": \"hashed_password\",\n    \"created_at\": \"2023-01-01T00:00:00Z\"\n  }\n  ```\n- The workflow must contain a **Set** node (`n8n-nodes-base.set`) connected to the Code node.\n- The Set node must be configured to **keep only** the `user_id`, `name`, and `email` fields, discarding `password_hash` and `created_at`.\n\n## Implementation Guide\n1. Create `/home/user/workspace/workflow.json`.\n2. Define the `nodes` array with the three required nodes.\n3. Set the `keepOnlySet` parameter to `true` on the Set node (or use the equivalent setting in newer n8n versions, like `options.keepOnlySet` or `parameters.keepOnlySet`) and map the required fields (`user_id`, `name`, `email`).\n4. Ensure the `connections` are properly set up (Trigger -\u003e Code -\u003e Set).\n\n## Constraints\n- Project path: `/home/user/workspace`\n- The file must be valid JSON."])</script><script>self.__next_f.push([1,"16:T6fc,"])</script><s
